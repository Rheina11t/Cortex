<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FamilyBrain — Coming Soon</title>
  <meta name="description" content="FamilyBrain — a smarter way to keep your family organised. Coming soon." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:      #0d9488;
      --teal-dark: #0f766e;
      --navy:      #1e3a5f;
      --bg:        #f0fdf9;
      --text:      #1a202c;
      --muted:     #4a5568;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 4px 32px rgba(13, 148, 136, 0.12), 0 1px 6px rgba(0,0,0,0.06);
      padding: 56px 48px 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--teal) 0%, var(--navy) 100%);
      border-radius: 16px;
      font-size: 32px;
      margin-bottom: 20px;
      box-shadow: 0 4px 16px rgba(13, 148, 136, 0.3);
    }

    .brand-name {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--navy);
      letter-spacing: -0.5px;
      margin-bottom: 28px;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, var(--teal), var(--navy));
      border-radius: 2px;
      margin: 0 auto 28px;
    }

    .tagline {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .domain {
      font-size: 0.9rem;
      color: var(--teal-dark);
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    @media (max-width: 480px) {
      .card { padding: 40px 28px 36px; }
      .brand-name { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-mark">🧠</div>
    <div class="brand-name">FamilyBrain</div>
    <div class="divider"></div>
    <p class="tagline">Coming soon — a smarter way to keep your family organised.</p>
    <p class="domain">familybrain.co.uk</p>
  </div>
</body>
</html>
